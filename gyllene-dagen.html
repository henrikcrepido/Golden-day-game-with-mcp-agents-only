<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gyllene Dagen 🌟</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Animations ─────────────────────────────────────── */
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    @keyframes diceRoll {
      0%   { transform: rotate(0deg) scale(1); }
      25%  { transform: rotate(90deg) scale(0.8); }
      50%  { transform: rotate(180deg) scale(1.1); }
      75%  { transform: rotate(270deg) scale(0.8); }
      100% { transform: rotate(360deg) scale(1); }
    }
    @keyframes markerBounce {
      0%, 100% { transform: translateY(0); }
      40%      { transform: translateY(-8px); }
      60%      { transform: translateY(-4px); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 200, 60, 0.6); }
      50%       { box-shadow: 0 0 0 10px rgba(255, 200, 60, 0); }
    }
    @keyframes winCelebrate {
      0%   { transform: scale(1) rotate(0deg); }
      25%  { transform: scale(1.3) rotate(-5deg); }
      75%  { transform: scale(1.3) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes markerMove {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.5) translateY(-6px); }
      100% { transform: scale(1); }
    }

    /* ── Base ────────────────────────────────────────────── */
    body {
      min-height: 100vh;
      background: #0d1117;
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(255, 180, 0, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(255, 100, 0, 0.10) 0%, transparent 55%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 4rem;
    }

    /* ── Title ───────────────────────────────────────────── */
    h1 {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #ffd54f, #ff8f00, #ffe082, #ff8f00, #ffd54f);
      background-size: 400px 1px;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      text-align: center;
    }
    .subtitle {
      color: #9090b8;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 0.3rem;
      text-align: center;
    }
    header { animation: floatUp 0.7s ease both; margin-bottom: 1.5rem; }

    /* ── Back button ─────────────────────────────────────── */
    .back-btn {
      position: fixed;
      top: 1rem;
      left: 1rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #aab;
      border-radius: 8px;
      padding: 0.4rem 0.9rem;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      z-index: 100;
    }
    .back-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }

    /* ── Screens ─────────────────────────────────────────── */
    .screen { width: 100%; max-width: 700px; animation: floatUp 0.5s ease both; }
    .screen.hidden { display: none !important; }

    /* ── Setup screen ────────────────────────────────────── */
    .setup-card {
      background: linear-gradient(145deg, #161b25, #0f1319);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .setup-card h2 {
      font-size: 1.1rem;
      color: #ffd54f;
      margin-bottom: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .player-count-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .count-btn {
      flex: 1;
      min-width: 60px;
      padding: 0.6rem 0;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #c0c0e0;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .count-btn:hover { border-color: #ffd54f88; color: #ffd54f; }
    .count-btn.active {
      border-color: #ffd54f;
      background: rgba(255, 213, 79, 0.12);
      color: #ffd54f;
    }

    /* ── Player setup rows ───────────────────────────────── */
    .player-setup-list { display: flex; flex-direction: column; gap: 1rem; }
    .player-setup-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 0.75rem 1rem;
    }
    .player-color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .character-picker {
      display: flex;
      gap: 0.4rem;
    }
    .char-btn {
      font-size: 1.6rem;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      line-height: 1;
    }
    .char-btn:hover { border-color: rgba(255,213,79,0.5); transform: scale(1.1); }
    .char-btn.selected {
      border-color: #ffd54f;
      background: rgba(255,213,79,0.15);
      animation: pulse 1.5s ease infinite;
    }
    .name-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 0.95rem;
      padding: 0.45rem 0.75rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .name-input:focus { border-color: #ffd54f88; }
    .name-input::placeholder { color: #5a5a7a; }

    .start-btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.85rem;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #ffb300, #ff6f00);
      color: #1a0a00;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255, 140, 0, 0.35);
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,140,0,0.45); }
    .start-btn:active { transform: translateY(1px); }
    .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Game screen ─────────────────────────────────────── */
    #game-screen { max-width: 800px; }

    .game-layout {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1.2rem;
      align-items: start;
    }

    /* ── Board ───────────────────────────────────────────── */
    .board-wrap {
      background: linear-gradient(145deg, #161b25, #0f1319);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 1rem;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 3px;
    }
    .sq {
      aspect-ratio: 1;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      font-weight: 600;
      position: relative;
      cursor: default;
      min-width: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      transition: transform 0.15s;
      overflow: hidden;
    }
    .sq .sq-num {
      font-size: 0.5rem;
      color: rgba(255,255,255,0.4);
      line-height: 1;
    }
    .sq .sq-icon {
      font-size: 0.9rem;
      line-height: 1;
    }
    .sq .sq-markers {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      justify-content: center;
      font-size: 0.75rem;
      line-height: 1;
      max-width: 100%;
    }
    .sq-marker { animation: markerBounce 0.6s ease; }

    /* Special square types */
    .sq-start  { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.3); }
    .sq-finish { background: rgba(255,213,79,0.18); border-color: rgba(255,213,79,0.4); }
    .sq-lucky  { background: rgba(52,211,153,0.1);  border-color: rgba(52,211,153,0.25); }
    .sq-unlucky{ background: rgba(252,129,129,0.1); border-color: rgba(252,129,129,0.25); }
    .sq-rest   { background: rgba(147,197,253,0.1); border-color: rgba(147,197,253,0.25); }
    .sq-golden { background: rgba(255,213,79,0.12); border-color: rgba(255,213,79,0.3); }

    .sq-current-highlight { animation: pulse 1s ease infinite !important; }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 170px;
      max-width: 200px;
    }

    /* ── Players panel ───────────────────────────────────── */
    .players-panel {
      background: linear-gradient(145deg, #161b25, #0f1319);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 0.9rem;
    }
    .players-panel h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6060a0;
      margin-bottom: 0.7rem;
    }
    .player-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.5rem;
      border-radius: 10px;
      margin-bottom: 0.3rem;
      transition: background 0.2s;
      font-size: 0.85rem;
    }
    .player-row.active-player {
      background: rgba(255,213,79,0.12);
      border: 1px solid rgba(255,213,79,0.25);
    }
    .player-row .p-char { font-size: 1.2rem; }
    .player-row .p-info { flex: 1; min-width: 0; }
    .player-row .p-name {
      font-weight: 700;
      color: #e8e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.8rem;
    }
    .player-row .p-pos {
      font-size: 0.68rem;
      color: #6060a0;
    }
    .player-row .p-tag {
      font-size: 0.62rem;
      padding: 0.15rem 0.4rem;
      border-radius: 999px;
      background: rgba(147,197,253,0.15);
      color: #93c5fd;
    }
    .player-row .p-tag.resting { background: rgba(147,197,253,0.15); color: #93c5fd; }
    .player-row .p-tag.turn    { background: rgba(255,213,79,0.15); color: #ffd54f; }

    /* ── Dice panel ──────────────────────────────────────── */
    .dice-panel {
      background: linear-gradient(145deg, #161b25, #0f1319);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 0.9rem;
      text-align: center;
    }
    .dice-panel h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6060a0;
      margin-bottom: 0.7rem;
    }
    .dice {
      font-size: 3.2rem;
      line-height: 1;
      margin: 0.3rem 0;
      display: inline-block;
      transition: transform 0.1s;
      user-select: none;
    }
    .dice.rolling { animation: diceRoll 0.5s linear infinite; }
    .roll-btn {
      width: 100%;
      padding: 0.6rem 0;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #ffb300, #ff6f00);
      color: #1a0a00;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 3px 14px rgba(255,140,0,0.3);
    }
    .roll-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,140,0,0.4); }
    .roll-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ── Event log ───────────────────────────────────────── */
    .log-panel {
      background: linear-gradient(145deg, #161b25, #0f1319);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 0.9rem;
      max-height: 160px;
      overflow-y: auto;
    }
    .log-panel h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6060a0;
      margin-bottom: 0.7rem;
    }
    .log-entry {
      font-size: 0.72rem;
      color: #8888b0;
      margin-bottom: 0.3rem;
      line-height: 1.4;
    }
    .log-entry span { color: #e8e8f0; font-weight: 600; }
    .log-entry.event-lucky  { color: #6ee7b7; }
    .log-entry.event-lucky span { color: #34d399; }
    .log-entry.event-unlucky { color: #fca5a5; }
    .log-entry.event-unlucky span { color: #f87171; }
    .log-entry.event-rest  { color: #93c5fd; }
    .log-entry.event-golden { color: #fde68a; }
    .log-entry.event-golden span { color: #ffd54f; }
    .log-panel::-webkit-scrollbar { width: 4px; }
    .log-panel::-webkit-scrollbar-track { background: transparent; }
    .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* ── Turn banner ─────────────────────────────────────── */
    .turn-banner {
      background: linear-gradient(145deg, #161b25, #0f1319);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 0.65rem 1rem;
      text-align: center;
      font-size: 0.85rem;
      color: #c0c0e0;
      margin-bottom: 0.8rem;
    }
    .turn-banner strong { color: #ffd54f; }

    /* ── Win overlay ─────────────────────────────────────── */
    #win-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #win-overlay.hidden { display: none; }
    .win-card {
      background: linear-gradient(145deg, #1e1b35, #161330);
      border: 2px solid rgba(255,213,79,0.4);
      border-radius: 24px;
      padding: 2.5rem 3rem;
      text-align: center;
      animation: fadeIn 0.4s ease both;
      max-width: 380px;
      width: 90%;
    }
    .win-char { font-size: 5rem; animation: winCelebrate 0.5s ease infinite; display: block; }
    .win-title {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(90deg, #ffd54f, #ff8f00, #ffe082);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0.5rem 0;
    }
    .win-subtitle { color: #8888b0; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .win-name { font-size: 1.4rem; font-weight: 800; color: #ffd54f; margin-bottom: 0.3rem; }
    .new-game-btn {
      width: 100%;
      padding: 0.8rem;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #ffb300, #ff6f00);
      color: #1a0a00;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s;
      box-shadow: 0 4px 18px rgba(255,140,0,0.35);
    }
    .new-game-btn:hover { transform: translateY(-2px); }

    /* ── Legend ──────────────────────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.8rem;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.65rem;
      color: #6060a0;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 0.2rem 0.5rem;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .game-layout { grid-template-columns: 1fr; }
      .sidebar { max-width: 100%; min-width: unset; flex-direction: row; flex-wrap: wrap; }
      .players-panel, .dice-panel, .log-panel { flex: 1; min-width: 140px; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <a class="back-btn" href="index.html">← Tillbaka</a>

  <header>
    <h1>🌟 Gyllene Dagen</h1>
    <p class="subtitle">Familjespel med tärning · upp till 4 spelare</p>
  </header>

  <!-- ── Setup screen ─────────────────────────────────── -->
  <div class="screen" id="setup-screen">
    <div class="setup-card">
      <h2>Hur många spelare?</h2>
      <div class="player-count-row">
        <button class="count-btn" data-n="2">2</button>
        <button class="count-btn active" data-n="3">3</button>
        <button class="count-btn" data-n="4">4</button>
      </div>

      <h2>Välj karaktär och skriv namn</h2>
      <div class="player-setup-list" id="player-setup-list"></div>

      <button class="start-btn" id="start-btn">🎲 Starta spelet!</button>
    </div>
  </div>

  <!-- ── Game screen ──────────────────────────────────── -->
  <div class="screen hidden" id="game-screen">
    <div class="turn-banner" id="turn-banner">Tur: <strong>—</strong></div>
    <div class="game-layout">
      <div>
        <div class="board-wrap">
          <div id="board"></div>
          <div class="legend">
            <div class="legend-item">🟢 Lyckodag +3</div>
            <div class="legend-item">🔴 Otur −3</div>
            <div class="legend-item">💤 Vila ett varv</div>
            <div class="legend-item">⭐ Gyllene dag ×2</div>
          </div>
        </div>
      </div>
      <div class="sidebar">
        <div class="players-panel">
          <h3>Spelare</h3>
          <div id="players-list"></div>
        </div>
        <div class="dice-panel">
          <h3>Tärning</h3>
          <div class="dice" id="dice">⚀</div>
          <button class="roll-btn" id="roll-btn">Kasta!</button>
        </div>
        <div class="log-panel">
          <h3>Händelser</h3>
          <div id="event-log"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Win overlay ──────────────────────────────────── -->
  <div id="win-overlay" class="hidden">
    <div class="win-card">
      <span class="win-char" id="win-char">🏆</span>
      <div class="win-name" id="win-name"></div>
      <div class="win-title">VANN! 🎉</div>
      <div class="win-subtitle" id="win-subtitle"></div>
      <button class="new-game-btn" id="new-game-btn">🎲 Nytt spel</button>
    </div>
  </div>

  <script>
    /* ── Configuration ─────────────────────────────────── */
    const TOTAL_SQUARES = 50;
    const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];
    const PLAYER_COLORS = ['#f59e0b', '#34d399', '#60a5fa', '#f87171'];

    /* Funny characters as in Monopoly — with Swedish names */
    const CHARACTERS = [
      { emoji: '🐸', name: 'Grodan' },
      { emoji: '🦊', name: 'Räven' },
      { emoji: '🐙', name: 'Bläckfisken' },
      { emoji: '🦁', name: 'Lejonet' },
      { emoji: '🐧', name: 'Pingvinen' },
      { emoji: '🦄', name: 'Enhörningen' },
      { emoji: '🐲', name: 'Draken' },
      { emoji: '🦋', name: 'Fjärilen' },
    ];

    /* Special square map: squareIndex → type */
    const SPECIAL = {
      5:  'lucky',    12: 'unlucky', 18: 'rest',    23: 'golden',
      27: 'lucky',    31: 'unlucky', 35: 'rest',    38: 'golden',
      42: 'lucky',    45: 'unlucky', 48: 'rest',
    };
    const SPECIAL_ICONS = {
      lucky: '🍀', unlucky: '⚡', rest: '💤', golden: '⭐',
      start: '🏁', finish: '🏆',
    };
    const SPECIAL_EFFECT = {
      lucky:   { delta:  3, msg: 'Lyckodag! 🍀 Gå 3 extra steg framåt!' },
      unlucky: { delta: -3, msg: 'Otur! ⚡ Gå 3 steg bakåt!' },
      rest:    { delta:  0, msg: 'Vila! 💤 Missa nästa tur.' },
      golden:  { delta:  0, msg: 'Gyllene dag! ⭐ Dubbla ditt nästa kast!' },
    };

    /* ── State ─────────────────────────────────────────── */
    let numPlayers = 3;
    let players = [];
    let currentPlayerIdx = 0;
    let diceValue = 1;
    let gameRunning = false;
    let squareDomEls = [];

    /* ── DOM refs ──────────────────────────────────────── */
    const setupScreen   = document.getElementById('setup-screen');
    const gameScreen    = document.getElementById('game-screen');
    const setupList     = document.getElementById('player-setup-list');
    const startBtn      = document.getElementById('start-btn');
    const boardEl       = document.getElementById('board');
    const playersListEl = document.getElementById('players-list');
    const diceEl        = document.getElementById('dice');
    const rollBtn       = document.getElementById('roll-btn');
    const eventLogEl    = document.getElementById('event-log');
    const turnBanner    = document.getElementById('turn-banner');
    const winOverlay    = document.getElementById('win-overlay');
    const winChar       = document.getElementById('win-char');
    const winName       = document.getElementById('win-name');
    const winSubtitle   = document.getElementById('win-subtitle');
    const newGameBtn    = document.getElementById('new-game-btn');

    /* ── Setup UI ──────────────────────────────────────── */
    function buildSetupUI() {
      setupList.textContent = '';
      for (let i = 0; i < numPlayers; i++) {
        const row = document.createElement('div');
        row.className = 'player-setup-row';
        row.dataset.player = i;

        const dot = document.createElement('div');
        dot.className = 'player-color-dot';
        dot.style.background = PLAYER_COLORS[i];

        const picker = document.createElement('div');
        picker.className = 'character-picker';

        CHARACTERS.forEach((ch, ci) => {
          const btn = document.createElement('button');
          btn.className = 'char-btn' + (ci === i ? ' selected' : '');
          btn.textContent = ch.emoji;
          btn.title = ch.name;
          btn.dataset.ci = ci;
          btn.addEventListener('click', () => {
            picker.querySelectorAll('.char-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
          });
          picker.appendChild(btn);
        });

        const input = document.createElement('input');
        input.className = 'name-input';
        input.type = 'text';
        input.maxLength = 14;
        input.placeholder = 'Spelarens namn…';
        input.value = CHARACTERS[i].name;

        row.appendChild(dot);
        row.appendChild(picker);
        row.appendChild(input);
        setupList.appendChild(row);
      }
    }

    document.querySelectorAll('.count-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        numPlayers = parseInt(btn.dataset.n, 10);
        buildSetupUI();
      });
    });

    buildSetupUI();

    startBtn.addEventListener('click', startGame);

    /* ── Start game ────────────────────────────────────── */
    function startGame() {
      players = [];
      const rows = setupList.querySelectorAll('.player-setup-row');
      rows.forEach((row, i) => {
        const selBtn = row.querySelector('.char-btn.selected');
        const ci = selBtn ? parseInt(selBtn.dataset.ci, 10) : i;
        const nameVal = row.querySelector('.name-input').value.trim() || CHARACTERS[ci].name;
        players.push({
          name: nameVal,
          emoji: CHARACTERS[ci].emoji,
          color: PLAYER_COLORS[i],
          pos: 0,          /* 0 = start, 1-50 = squares */
          resting: false,
          doubleNext: false,
        });
      });

      currentPlayerIdx = 0;
      gameRunning = true;
      eventLogEl.textContent = '';

      setupScreen.classList.add('hidden');
      gameScreen.classList.remove('hidden');
      winOverlay.classList.add('hidden');

      buildBoard();
      renderPlayers();
      renderBoard();
      updateTurnBanner();
    }

    /* ── Board ─────────────────────────────────────────── */
    function buildBoard() {
      boardEl.textContent = '';
      squareDomEls = [];

      /* Squares 1–50 laid out in a serpentine (boustrophedon) pattern:
         Row 0 (bottom): 1→10 left-to-right
         Row 1:         11→20 right-to-left
         Row 2:         21→30 left-to-right
         … etc.
         We display top-to-bottom in the DOM grid (row 4 top = squares 41-50). */

      const rows = 5; /* 50 squares / 10 cols */
      /* Build a 2D position map: squareNumber → {gridRow, gridCol} */
      const posMap = {};
      for (let r = 0; r < rows; r++) {
        const domRow = rows - 1 - r; /* flip: square row 0 = DOM row 4 */
        for (let c = 0; c < 10; c++) {
          const squareNum = r * 10 + (r % 2 === 0 ? c + 1 : 10 - c);
          posMap[squareNum] = { domRow, domCol: c };
        }
      }

      /* Create a flat 5×10 grid of DOM elements */
      const grid = [];
      for (let dr = 0; dr < rows; dr++) {
        grid[dr] = [];
        for (let dc = 0; dc < 10; dc++) {
          const el = document.createElement('div');
          el.className = 'sq';
          grid[dr][dc] = el;
          boardEl.appendChild(el);
        }
      }

      /* Populate squares with their numbers and special icons */
      for (let n = 1; n <= TOTAL_SQUARES; n++) {
        const { domRow, domCol } = posMap[n];
        const el = grid[domRow][domCol];
        el.dataset.sq = n;

        const numEl = document.createElement('div');
        numEl.className = 'sq-num';
        numEl.textContent = n;

        const iconEl = document.createElement('div');
        iconEl.className = 'sq-icon';

        const markersEl = document.createElement('div');
        markersEl.className = 'sq-markers';

        if (n === 1) {
          el.classList.add('sq-start');
          iconEl.textContent = SPECIAL_ICONS.start;
        } else if (n === TOTAL_SQUARES) {
          el.classList.add('sq-finish');
          iconEl.textContent = SPECIAL_ICONS.finish;
        } else if (SPECIAL[n]) {
          el.classList.add('sq-' + SPECIAL[n]);
          iconEl.textContent = SPECIAL_ICONS[SPECIAL[n]];
        }

        el.appendChild(numEl);
        el.appendChild(iconEl);
        el.appendChild(markersEl);

        squareDomEls[n] = { el, markersEl };
      }
    }

    /* ── Render board markers ───────────────────────────── */
    function renderBoard() {
      /* Clear all markers */
      squareDomEls.forEach(sq => { if (sq) sq.markersEl.textContent = ''; });

      /* Also handle start (pos = 0) */
      const startSq = squareDomEls[1];

      players.forEach(p => {
        const sqIdx = Math.max(1, Math.min(p.pos === 0 ? 1 : p.pos, TOTAL_SQUARES));
        const sq = squareDomEls[sqIdx];
        if (!sq) return;
        const span = document.createElement('span');
        span.className = 'sq-marker';
        span.textContent = p.emoji;
        sq.markersEl.appendChild(span);
      });
    }

    /* ── Render players sidebar ─────────────────────────── */
    function renderPlayers() {
      playersListEl.textContent = '';
      players.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'player-row' + (i === currentPlayerIdx ? ' active-player' : '');

        const charEl = document.createElement('div');
        charEl.className = 'p-char';
        charEl.textContent = p.emoji;

        const info = document.createElement('div');
        info.className = 'p-info';

        const nameEl = document.createElement('div');
        nameEl.className = 'p-name';
        nameEl.textContent = p.name;
        nameEl.style.color = p.color;

        const posEl = document.createElement('div');
        posEl.className = 'p-pos';
        posEl.textContent = p.pos === 0 ? 'Start' : 'Ruta ' + p.pos;

        info.appendChild(nameEl);
        info.appendChild(posEl);
        row.appendChild(charEl);
        row.appendChild(info);

        if (p.resting) {
          const tag = document.createElement('div');
          tag.className = 'p-tag resting';
          tag.textContent = '💤';
          row.appendChild(tag);
        } else if (i === currentPlayerIdx) {
          const tag = document.createElement('div');
          tag.className = 'p-tag turn';
          tag.textContent = '🎲';
          row.appendChild(tag);
        }
        if (p.doubleNext) {
          const tag2 = document.createElement('div');
          tag2.className = 'p-tag';
          tag2.style.background = 'rgba(255,213,79,0.18)';
          tag2.style.color = '#ffd54f';
          tag2.textContent = '×2';
          row.appendChild(tag2);
        }

        playersListEl.appendChild(row);
      });
    }

    /* ── Turn banner ────────────────────────────────────── */
    function updateTurnBanner() {
      const p = players[currentPlayerIdx];
      const extra = p.doubleNext ? ' <span style="color:#ffd54f">(×2 nästa kast!)</span>' : '';
      turnBanner.innerHTML = p.emoji + ' <strong style="color:' + p.color + '">' + p.name + '</strong> — din tur!' + extra;
    }

    /* ── Log event ──────────────────────────────────────── */
    function logEvent(msg, cls) {
      const el = document.createElement('div');
      el.className = 'log-entry' + (cls ? ' ' + cls : '');
      el.innerHTML = msg;
      eventLogEl.prepend(el);
      /* Keep max 30 entries */
      while (eventLogEl.children.length > 30) {
        eventLogEl.removeChild(eventLogEl.lastChild);
      }
    }

    /* ── Dice roll ──────────────────────────────────────── */
    rollBtn.addEventListener('click', () => {
      if (!gameRunning) return;
      rollBtn.disabled = true;

      const p = players[currentPlayerIdx];

      /* Skip if resting */
      if (p.resting) {
        p.resting = false;
        logEvent(p.emoji + ' <span>' + p.name + '</span> vilar ett varv — hoppar över!', 'event-rest');
        advanceTurn();
        return;
      }

      /* Animate dice */
      diceEl.classList.add('rolling');
      let ticks = 0;
      const maxTicks = 10;
      const anim = setInterval(() => {
        diceEl.textContent = DICE_FACES[Math.floor(Math.random() * 6)];
        ticks++;
        if (ticks >= maxTicks) {
          clearInterval(anim);
          diceEl.classList.remove('rolling');
          const raw = Math.floor(Math.random() * 6) + 1;
          diceValue = p.doubleNext ? Math.min(raw * 2, 12) : raw;
          p.doubleNext = false;
          diceEl.textContent = diceValue <= 6 ? DICE_FACES[diceValue - 1] : '🎲 ' + diceValue;
          applyMove(raw, diceValue);
        }
      }, 55);
    });

    /* ── Apply move ─────────────────────────────────────── */
    function applyMove(rawRoll, steps) {
      const p = players[currentPlayerIdx];
      const oldPos = p.pos === 0 ? 0 : p.pos;
      let newPos = oldPos + steps;

      /* Bounce back if overshoot */
      if (newPos > TOTAL_SQUARES) {
        newPos = TOTAL_SQUARES - (newPos - TOTAL_SQUARES);
      }

      p.pos = Math.max(1, newPos);

      logEvent(p.emoji + ' <span>' + p.name + '</span> kastade ' + rawRoll +
        (steps !== rawRoll ? ' (×2 = ' + steps + ')' : '') + ' → ruta ' + p.pos);

      renderBoard();
      renderPlayers();

      /* Check for win */
      if (p.pos >= TOTAL_SQUARES) {
        setTimeout(() => triggerWin(p), 400);
        return;
      }

      /* Apply special square effect */
      const special = SPECIAL[p.pos];
      if (special) {
        const effect = SPECIAL_EFFECT[special];
        const evClass = 'event-' + special;

        setTimeout(() => {
          logEvent(p.emoji + ' <span>' + p.name + '</span>: ' + effect.msg, evClass);

          if (effect.delta !== 0) {
            p.pos = Math.max(1, Math.min(p.pos + effect.delta, TOTAL_SQUARES));
            renderBoard();
            renderPlayers();
            if (p.pos >= TOTAL_SQUARES) {
              setTimeout(() => triggerWin(p), 400);
              return;
            }
          }
          if (special === 'rest')   { p.resting = true; }
          if (special === 'golden') { p.doubleNext = true; }

          renderPlayers();
          setTimeout(advanceTurn, 700);
        }, 500);
      } else {
        setTimeout(advanceTurn, 700);
      }
    }

    /* ── Advance turn ───────────────────────────────────── */
    function advanceTurn() {
      currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
      rollBtn.disabled = false;
      renderPlayers();
      updateTurnBanner();
    }

    /* ── Win ────────────────────────────────────────────── */
    function triggerWin(winner) {
      gameRunning = false;
      rollBtn.disabled = true;
      winChar.textContent = winner.emoji;
      winName.textContent = winner.name;
      winSubtitle.textContent = 'Grattis! Du nådde mål på ruta ' + TOTAL_SQUARES + '! 🥳';
      winOverlay.classList.remove('hidden');
    }

    newGameBtn.addEventListener('click', () => {
      winOverlay.classList.add('hidden');
      gameScreen.classList.add('hidden');
      setupScreen.classList.remove('hidden');
    });
  </script>
</body>
</html>
