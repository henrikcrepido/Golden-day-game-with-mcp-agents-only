<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Day Games</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 200, 60, 0.5); }
      50%       { box-shadow: 0 0 0 12px rgba(255, 200, 60, 0); }
    }

    body {
      min-height: 100vh;
      background: #0d0d1a;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(80, 40, 160, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(30, 80, 180, 0.25) 0%, transparent 60%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 5rem;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: floatUp 0.7s ease both;
    }

    header .logo {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #ffd54f, #ff8f00, #ffe082, #ff8f00, #ffd54f);
      background-size: 400px 1px;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    header .tagline {
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #9090b8;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Grid ────────────────────────────────────────── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 1.8rem;
      width: 100%;
      max-width: 900px;
    }

    /* ── Card ────────────────────────────────────────── */
    .game-card {
      background: linear-gradient(145deg, #1c1c35, #14142a);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      animation: floatUp 0.6s ease both;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .game-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: rgba(255, 200, 60, 0.4);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
      animation: pulse 1.4s ease infinite;
    }

    .card-icon {
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      user-select: none;
    }

    .card-body {
      padding: 1.2rem 1.4rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f0eefc;
    }

    .card-desc {
      font-size: 0.85rem;
      color: #8080a8;
      line-height: 1.5;
      flex: 1;
    }

    .card-badge {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge-ready {
      background: rgba(52, 211, 153, 0.15);
      color: #34d399;
      border: 1px solid rgba(52, 211, 153, 0.3);
    }

    .badge-soon {
      background: rgba(148, 163, 184, 0.1);
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    /* ── Coming-soon placeholder ─────────────────────── */
    .game-card.soon {
      opacity: 0.55;
      pointer-events: none;
    }

    /* ── Footer ────────────────────────────────────────── */
    footer {
      margin-top: 4rem;
      font-size: 0.78rem;
      color: #444466;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">&#9733; Golden Day Games</div>
    <p class="tagline">Pick a game &amp; play</p>
  </header>

  <div class="games-grid">

    <!-- Minesweeper -->
    <a class="game-card" href="minesweeper.html" style="animation-delay: 0.05s">
      <div class="card-icon">💣</div>
      <div class="card-body">
        <div class="card-title">Minesweeper</div>
        <div class="card-desc">Reveal every safe cell without hitting a mine. Choose your difficulty and beat the clock.</div>
        <span class="card-badge badge-ready">Play now</span>
      </div>
    </a>

    <!-- Placeholder slots - easily duplicate &amp; fill in when you add more games -->
    <div class="game-card soon" style="animation-delay: 0.10s">
      <div class="card-icon">🎮</div>
      <div class="card-body">
        <div class="card-title">More Games</div>
        <div class="card-desc">New games are on their way. Stay tuned!</div>
        <span class="card-badge badge-soon">Coming soon</span>
      </div>
    </div>

  </div>

  <footer>Golden Day Games &copy; 2026</footer>

</body>
</html>
